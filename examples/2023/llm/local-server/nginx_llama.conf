# Minimal nginx config for a local llama.cpp server.
# Place at /etc/nginx/sites-available/llama and symlink to sites-enabled.

server {
    listen 8000;
    server_name localhost;

    # Basic auth — keep the local inference server from being trivially open.
    auth_basic "LLM Local API";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Required for SSE / streaming responses.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
