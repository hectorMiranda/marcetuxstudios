<!DOCTYPE html>
<!-- A tiny Knockout.js dashboard: the table is a projection of the view model.
     Change the data and every binding updates itself. Knockout 2.1, jQuery 1.8. -->
<html>
<head>
  <meta charset="utf-8">
  <title>Bandwidth — marcetux example</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.0/jquery.min.js"></script>
  <script src="https://ajax.aspnetcdn.com/ajax/knockout/knockout-2.1.0.js"></script>
</head>
<body>
  <h1>Bandwidth by customer</h1>
  <table border="1" cellpadding="6">
    <thead><tr><th>Customer</th><th>GB</th></tr></thead>
    <tbody data-bind="foreach: customers">
      <tr><td data-bind="text: name"></td><td data-bind="text: gb"></td></tr>
    </tbody>
    <tfoot><tr><th>Total</th><th data-bind="text: total"></th></tr></tfoot>
  </table>

  <script>
    function ViewModel() {
      var self = this;
      self.customers = ko.observableArray([
        { name: "Acme",   gb: 1240 },
        { name: "Globex", gb: 880  },
        { name: "Initech", gb: 305 }
      ]);
      // Computed: recalculates automatically when the array changes.
      self.total = ko.computed(function () {
        var sum = 0;
        ko.utils.arrayForEach(self.customers(), function (c) { sum += c.gb; });
        return sum;
      });
    }
    ko.applyBindings(new ViewModel());
  </script>
</body>
</html>
